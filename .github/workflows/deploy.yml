name: CI/CD Deploy Web UEFN-Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ghcr.io/jjmirandaa86/uefn-frontend:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Docker Image
        run: |
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Sync .env from GitHub secret to server
        env:
          UEFN_FRONTEND_ENV: ${{ secrets.UEFN_FRONTEND_ENV }}
        run: |
          if [ -z "$UEFN_FRONTEND_ENV" ]; then
            echo "❌ Falta el secret UEFN_FRONTEND_ENV"
            echo "   GitHub → Settings → Secrets → Actions → New repository secret"
            echo "   Pega el contenido completo de tu archivo .env local"
            exit 1
          fi
          printf '%s\n' "$UEFN_FRONTEND_ENV" > /tmp/uefn-frontend.env
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_IP }} "mkdir -p /app/projects"
          scp -i ~/.ssh/id_rsa /tmp/uefn-frontend.env root@${{ secrets.SERVER_IP }}:/app/projects/.env
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_IP }} "chmod 600 /app/projects/.env"
          rm -f /tmp/uefn-frontend.env
          echo "✅ .env sincronizado en el servidor"

      - name: Deploy to Server
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_IP }} << EOF
            cd /app/projects || exit 1

            set -e

            IMAGE=ghcr.io/jjmirandaa86/uefn-frontend:latest
            ENV_FILE=/app/projects/.env

            echo "🔐 Login to GHCR from droplet..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u jjmirandaa86 --password-stdin

            echo "🌐 Creating Docker network if not exists..."
            docker network inspect app_network >/dev/null 2>&1 || docker network create app_network

            echo "📦 Pulling image..."
            docker pull \$IMAGE

            echo "🛑 Stopping old container..."
            docker stop uefn-frontend || true
            docker rm uefn-frontend || true

            echo "🚀 Running new container..."
            docker run -d \
              --name uefn-frontend \
              --network app_network \
              --restart unless-stopped \
              --env-file "\$ENV_FILE" \
              \$IMAGE

            echo "✅ Deploy completed"
          EOF
